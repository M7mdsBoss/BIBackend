name: Deploy to WafaiCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.BI_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p ${{ secrets.BI_SSH_PORT }} \
            ${{ secrets.BI_SSH_USER }}@${{ secrets.BI_SSH_HOST }} \
            "cd /home/jelastic/ROOT && git fetch origin main && git reset --hard origin/main && npm install && npx prisma generate && pm2 restart backend"